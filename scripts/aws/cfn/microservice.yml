AWSTemplateFormatVersion: 2010-09-09
Description: 'Example microservice deploy'

Parameters:
  ProjectName:
    Type: String
    Description: 'Usually pn can be pnXYZ where XYZ are the feature number, useful to create
      experimental environments without crash official development environment'

  AlarmSNSTopicArn:
    Type: String
    Description: ARN of alarm topic

  MetricNamespace:
    Type: String
    Description: CloudWatch custom metric namespace
    Default: Advanced

  RaddApiDnsName:
    Type: String
    Description: 'The DNS name used for B2B rest API.'

  CorsAllowedDomains:
    Type: String
    Description: 'Comma separated list of domains allowed to make cross origin request'

  ContainerImageUri:
    Type: String
    Description: 'Exact container image URI with full repository and image digest'

  MicroserviceNumber:
    Type: Number
    Description: 'Disambiguation useful for load balancer rules'

  TemplateBucketBaseUrl:
    Type: String
    Description: 'The S3 bucket from which to fetch the templates used by this stack.'

  ECSClusterName:
    Type: String
    Description: 'The name of the ECS cluster where the microservice is going to be deployed'

  SubnetsIds:
    Type: String
    Description: 'subnets ids comma separated list. Where to deploy the microservice'

  VpcId:
    Type: String
    Description: 'VpcId where the microservice is going to be deployed'

  VpcEgressSubnetsIds:
    Type: String
    Description: 'subnets where to install PN-CORE'
  
  EcsDefaultSecurityGroup:
    Type: String
    Description: 'Default security group required by infrastructure'

  ApplicationLoadBalancerListenerArn:
    Type: String
    Description: 'Load balancer listener where HTTP endpoints is going to be registered'

  ApplicationLoadBalancerDomain:
    Type: String
    Description: 'Base URL of the load balancer where the service is going to be reachable'

  SandboxSafeStorageBaseUrl:
    Type: String
    Description: 'Url to the SafeStorage microservice'

  SafeStorageCxId:
    Type: String
    Description: 'SafeStorage cx-id'

  AttemptBatchWriter:
    Type: String
    Description: 'Number of attempt for unprocessed item writer'
    Default: 3

  SafeStorageDocType:
    Type: String
    Description: 'SafeStorage document-type'

  RegistrySafeStorageDocType:
    Type: String
    Description: 'Radd registry SafeStorage document-type'

  NetworkLoadBalancerLink:
    Type: String
    Description: 'network load balancer link for API-GW'

  RaddTransactionDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing radd transaction'

  RaddTransactionDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing radd transaction'

  OperationsDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing iuns and operations'

  OperationsDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing iuns and operations'

  RaddRegistryRequestDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing radd registry requests'

  RaddRegistryRequestDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing radd registry requests'

  RaddRegistryImportDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing anagrafiche'

  RaddRegistryImportDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing anagrafiche'

  RaddRegistryDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing radd registries'

  RaddRegistryDynamoTableV2Name:
    Type: String
    Description: 'Name of dynamodb table V2 containing radd registries'

  RaddCoverageDynamoTableName:
    Type: String
    Description: 'Name of dynamodb table containing radd coverage'

  RaddRegistryDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing radd registries'

  RaddRegistryDynamoTableV2Arn:
    Type: String
    Description: 'ARN of dynamodb table V2 containing radd registries'

  RaddCoverageDynamoTableArn:
    Type: String
    Description: 'ARN of dynamodb table containing radd coverage'

  ShedLockTableName:
    Type: String
    Description: Name of DynamoDB table used for implementing distributed locks.

  ShedLockTableArn:
    Type: String
    Description: ARN of DynamoDB table for distributed locks.

  RegistryDefaultEndValidity:
    Type: String
    Description: 'Default end validity for radd registry in days'

  RegistryDefaultDeleteRule:
    Type: String
    Description: 'Default delete role for radd registry'

  RegistryImportUploadFileTtl:
    Type: Number
    Description: 'Time, expressed in seconds, within which it is possible to upload the csv (validity of safestorage url)'

  MaxQuerySize:
    Type: Number
    Description: 'Max query size'

  SafeStorageToRaddAltQueueARN:
    Type: String
    Description: 'SafeStorage-to-f24 queue ARN'

  SecretAndSSMPrefix:
    Type: String
    Default: pn-radd-alt
    Description: 'Secret and Parameter name prefix'

  Version:
    Type: String
    Description: 'keep track of used projects commitIds'

  AlbSecurityGroup:
    Type: String
    Description: 'Application load balancer security group'

  # Logging parameters
  WireTapLogActivation:
    Type: String
    Default: false
    Description: Activation of wire logs
    AllowedValues:
      - true
      - false

  DocumentPageCountEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: 'Enable or disable Document page count calculation for cover file generation'

  PnCronAnalyzer:
    Type: String
    Default: '-'
    Description: Cron for which you send the metric to CloudWatch

  # EFS parameters
  FargateEFSFileSystemID:
    Type: String
    Description: "EFS Filesystem"

  MountEfs:
    Type: String
    Default: false
    AllowedValues:
      - "true"
      - "false"

  # OpenApi Bucket params
  MicroserviceBucketName:
    Type: String
    Default: ''
    Description: 'Name of the bucket where the microservice files are copied during deploy'

  MicroserviceBucketBaseKey:
    Type: String
    Default: ''
    Description: 'Base key of the microservice in the s3 bucket'

  # Log group parameters
  EcsLogGroup:
    Type: String
    Description: 'Ecs log group name'

  LogsKinesisSourceStreamArn:
    Type: String
    Description: 'Kinesis stream that receive logs'

  # Heath Check parameters
  HealthCheckInterval:
    Description: Seconds between two health check
    Type: Number
    Default: 60

  HealthCheckTimeout:
    Description: health check timeout seconds
    Type: Number
    Default: 5
  
  HealthyThresholdCount:
    Description: |
      The number of consecutive health checks successes required before considering 
      an unhealthy target healthy. 
    Type: Number
    Default: 5
  
  UnhealthyThresholdCount:
    Description: |
      The number of consecutive health check failures required before considering a target unhealthy. 
    Type: Number
    Default: 2

  # Instance parameters
  # 256 (.25 vCPU) - Available memory values: 0.5GB, 1GB, 2GB
  # 512 (.5 vCPU) - Available memory values: 1GB, 2GB, 3GB, 4GB
  # 1024 (1 vCPU) - Available memory values: 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB
  # 2048 (2 vCPU) - Available memory values: Between 4GB and 16GB in 1GB increments
  # 4096 (4 vCPU) - Available memory values: Between 8GB and 30GB in 1GB increments
  CpuValue:
    Type: Number
    Default: 1024
    Description: Fargate virtual CPU quantity 1024 equals one vCPU

  # 0.5GB, 1GB, 2GB - Available cpu values: 256 (.25 vCPU)
  # 1GB, 2GB, 3GB, 4GB - Available cpu values: 512 (.5 vCPU)
  # 2GB, 3GB, 4GB, 5GB, 6GB, 7GB, 8GB - Available cpu values: 1024 (1 vCPU)
  # Between 4GB and 16GB in 1GB increments - Available cpu values: 2048 (2 vCPU)
  # Between 8GB and 30GB in 1GB increments - Available cpu values: 4096 (4 vCPU)
  MemoryAmount:
    Type: String
    Default: 2GB
    Description: memory amount reserved to the task pod.
    AllowedValues: [ 2GB, 4GB, 6GB, 8GB ]

  # Autoscaling parameters
  AutoscalingCheckPeriod:
    Default: 60
    Type: Number
    Description: minimum autoscaling number of tasks\

  AutoscalingDataPointN:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M

  AutoscalingDataPointM:
    Default: 1
    Type: Number
    Description: activate when N datapoint on M

  AutoscalingThreshold:
    Default: 70
    Type: String
  
  MinTasksNumber:
    Default: 1
    Type: Number
    Description: minimum autoscaling number of tasks

  MaxTasksNumber:
    Default: 6
    Type: Number
    Description: maximum autoscaling number of tasks

  SanitizeMode:
    Default: ESCAPING
    Type: String
    Description: Html Sanitize Mode

  FreeMarkerTemplateLoaderPath:
    Default: documents_composition_templates
    Type: String
    Description: directory in which html templates are found

  FreeMarkerSuffix:
    Default: .html
    Type: String
    Description: html template suffix

  DocumentTypeEnumFilter:
    Type: String
    Description: document type filter list

  RaddWafLimit:
    Type: Number
    Default: 600000
    Description: RADD waf limit

  PnRaddAltInputQueueName:
    Type: String
    Description: 'Name of Internal queue'

  PnRaddAltInputQueueARN:
    Type: String
    Description: 'ARN for PnRaddAltInputQueue'

  PnRaddAltInputQueueDLQName:
    Type: String
    Description: 'Name of DLQ for PnRaddAltInputQueue'

  PnRaddAltInputQueueDLQARN:
    Type: String
    Description: 'DLQ ARN for PnRaddAltInputQueue'

  SafeStorageToRaddAltQueueName:
    Type: String
    Description: 'Name of SafeStorage queue'

  VerifyRaddRegistryImportLockAtMost:
    Type: String
    Description: It specifies how long the lock should be kept in case the executing node dies for Recovery batches (milliseconds)
    Default: '120000'

  VerifyRaddRegistryImportLockAtLeast:
    Type: String
    Description: It specifies minimum amount of time for which the lock should be kept (milliseconds)
    Default: '1000'

  VerifyRaddRegistryImportDelay:
    Type: Number
    Description: It defines the time interval between each batch of clean expires working requests (milliseconds)
    Default: '120000'

  RegistryImportReplacedTtl:
    Type: Number
    Description: 'Time, expressed in hours, in which the record persists on the table'

  EvaluatedZipCodeConfigType:
    Type: String
    Default: ZIPCODE
    Description: 'Config type for zipCode to paper channel'

  EvaluatedZipCodeConfigNumber:
    Type: Number
    Default: 1
    Description: 'Config number for zipCode to paper channel'

  PnRaddMaxDynamoDBQuerySize:
    Type: Number
    Description: max number of record before reaching 1MB DynamoDb limitation
    Default: 1000

  PnRaddMaxPageNumber:
    Type: Number
    Description: max number of pages to retrieve nextPagesKey of (listing APIs)
    Default: 10

  MaxPrintRequests:
    Type: Number
    Default: 0
    Description: 'Max number of print requests (0 means no limit)'

  # Application throttling parameters
  ApplicationLoadBalancerArn:
    Type: String
    Description: 'Application load balancer ARN'

  MaxRequestPerThrottlingPeriod:
    Type: Number
    MinValue: 100
    MaxValue: 2000000000
    Description: 'Max request per throttling period'

  ThrottlingPeriodSeconds:
    Type: Number
    AllowedValues: [60, 120, 300, 600]
    Description: 'Throttling period in seconds'

  LogRetention:
    Type: Number
    Default: 14

  BlockImportLocations:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: true

  AwsGeoRegionCode:
    Type: String
    Description: 'AWS region code for Geoplaces client'

  # RADD private proxy Lambda parameters
  RaddPrivateProxyEnabled:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable RADD PrivateLink Lambda proxy resources

  RaddPrivateProxyAlbListenerArn:
    Type: String
    Default: ''
    Description: Dedicated ALB listener ARN for the RADD private proxy

  RaddPrivateProxyEndpointServiceId:
    Type: String
    Default: ''
    Description: RADD endpoint service id used to validate technical VPCE Host headers

  RaddPrivateProxyRulePriority:
    Type: Number
    Default: 45000
    Description: Listener rule priority for the RADD private proxy Lambda target group

  RaddPrivateProxyAllowedPathPrefix:
    Type: String
    Default: '/radd-net/api/v1/act/'
    Description: Allowed path prefix for the RADD private proxy

  RaddPrivateProxyListenerPathPrefix:
    Type: String
    Default: ''
    Description: Dedicated ALB listener rule path prefix for the RADD private proxy; leave empty to match any path

  RaddPrivateProxyTrustedHeaders:
    Type: String
    Default: '{"x-pagopa-pn-src-ch":"RADD","x-pagopa-pn-src-ch-details":"NONINTEROP","x-pagopa-pn-cx-type":"RADD","x-pagopa-pn-cx-role":"RADD_UPLOADER","x-pagopa-pn-cx-id":"97103880585","uid":"RADD_cf_97103880585","x-pagopa-pn-uid":"RADD_cf_97103880585","x-pagopa-pn-cx-groups":""}'
    Description: Escaped JSON object containing stable trusted headers for the RADD private proxy

  RaddPrivateProxyLambdaName:
    Type: String
    Description: Name of the RADD private proxy Lambda function, valorized by storage.yml related output

  RaddPrivateProxyLambdaRuntime:
    Type: String
    Default: nodejs24.x
    Description: Runtime of the RADD private proxy Lambda

  RaddPrivateProxyLambdaMemorySize:
    Type: Number
    Default: 512
    MinValue: 512
    MaxValue: 10240
    Description: Memory size of the RADD private proxy Lambda

  RaddPrivateProxyLambdaTimeout:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 30
    Description: Timeout in seconds of the RADD private proxy Lambda

  RaddPrivateProxyReservedConcurrency:
    Type: Number
    Default: 10
    MinValue: 0
    Description: Reserved concurrency of the RADD private proxy Lambda

  RaddPrivateProxyExternalPort:
    Type: String
    Default: '8443'
    Description: Required external PrivateLink port to force in x-pagopa-pn-base-url; use 443 to omit the port from the final URL

  RaddPrivateProxyExternalProtocol:
    Type: String
    Default: 'https'
    AllowedValues:
      - 'https'
      - 'http'
    Description: Required external PrivateLink protocol to force in x-pagopa-pn-base-url

  RaddPrivateProxyVerboseLogging:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable full ingress payload and header logging for the RADD private proxy

  RaddPrivateProxyDurationAlarmThreshold:
    Type: Number
    Default: 8000
    Description: Duration alarm threshold in milliseconds for the RADD private proxy Lambda

  RaddPrivateProxyLogAlarmEvaluationPeriods:
    Type: Number
    Default: 1
    Description: Evaluation periods for RADD private proxy log metric alarms

Conditions:
  IsImportLocationsBlocked: !Equals [!Ref BlockImportLocations, 'true']
  IsRaddPrivateProxyEnabled: !Equals [!Ref RaddPrivateProxyEnabled, 'true']
  HasRaddPrivateProxyListenerPathPrefix: !Not [!Equals [!Ref RaddPrivateProxyListenerPathPrefix, '']]

Resources:

  # PN-Radd-Fsu microservice
  RaddMicroservice:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/ecs-service.yaml"
      Parameters:
        MicroServiceUniqueName: !Sub '${ProjectName}-radd-alt'
        CpuValue: !Ref CpuValue
        MemoryAmount: !Ref MemoryAmount
        HealthCheckTimeout: !Ref HealthCheckTimeout
        HealthCheckInterval: !Ref HealthCheckInterval
        HealthyThresholdCount: !Ref HealthyThresholdCount
        UnhealthyThresholdCount: !Ref UnhealthyThresholdCount
        AutoscalingStrategy: REST-API
        AutoscalingThreshold: !Ref AutoscalingThreshold
        AutoscalingCheckPeriod: !Ref AutoscalingCheckPeriod
        MinTasksNumber: !Ref MinTasksNumber
        MaxTasksNumber: !Ref MaxTasksNumber
        EfsFilesystem: !Ref FargateEFSFileSystemID
        MountEfs: !Ref MountEfs
        WireTapLogActivation: !Ref WireTapLogActivation
        AutoscalingDataPointN: !Ref AutoscalingDataPointN
        AutoscalingDataPointM: !Ref AutoscalingDataPointM
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        ContainerImageURI: !Sub '${ContainerImageUri}'
        ContainerEnvEntry1: !Sub 'AWS_REGIONCODE=${AWS::Region}'
        ContainerEnvEntry2: !Sub 'CORS_ALLOWED_DOMAINS=${CorsAllowedDomains}'
        ContainerEnvEntry3: !Sub 'PN_RADD_DAO_RADDTRANSACTIONTABLE=${RaddTransactionDynamoTableName}'
        ContainerEnvEntry4: 'PN_RADD_CLIENT_DATAVAULT_BASEPATH=http://alb.confidential.pn.internal:8080'
        ContainerEnvEntry5: !Sub 'PN_RADD_CLIENT_DELIVERY_BASEPATH=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry6: !Sub 'PN_RADD_CLIENT_DELIVERY_PUSH_BASEPATH=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry7: !Sub 'PN_RADD_CLIENT_DELIVERY_PUSH_INTERNAL_BASEPATH=http://${ApplicationLoadBalancerDomain}:8080'
        ContainerEnvEntry8: !Sub 'PN_RADD_CLIENT_SAFE_STORAGE_BASEPATH=${SandboxSafeStorageBaseUrl}'
        ContainerEnvEntry9: !Sub 'PN_RADD_SAFESTORAGECXID=${SafeStorageCxId}'
        ContainerEnvEntry10: !Sub 'PN_RADD_ATTEMPTBATCHWRITER=${AttemptBatchWriter}'
        ContainerEnvEntry11: !Sub 'PN_RADD_SAFESTORAGEDOCTYPE=${SafeStorageDocType}'
        ContainerEnvEntry12: !Sub 'PN_RADD_DAO_IUNSOPERATIONSTABLE=${OperationsDynamoTableName}'
        ContainerEnvEntry13: !Sub 'PN_RADD_SANITIZE_MODE=${SanitizeMode}'
        ContainerEnvEntry14: !Sub 'SPRING_FREEMARKER_TEMPLATE_LOADER_PATH=${FreeMarkerTemplateLoaderPath}'
        ContainerEnvEntry15: !Sub 'SPRING_FREEMARKER_SUFFIX=${FreeMarkerSuffix}'
        ContainerEnvEntry16: !Sub 'PN_RADD_DOCUMENT_TYPE_ENUM_FILTER=${DocumentTypeEnumFilter}'
        ContainerEnvEntry17: !Sub 'PN_RADD_DAO_RADDREGISTRYREQUESTTABLE=${RaddRegistryRequestDynamoTableName}'
        ContainerEnvEntry18: !Sub 'PN_RADD_DAO_RADDREGISTRYIMPORTTABLE=${RaddRegistryImportDynamoTableName}'
        ContainerEnvEntry19: !Sub 'PN_RADD_DAO_RADDREGISTRYTABLE=${RaddRegistryDynamoTableName}'
        ContainerEnvEntry20: !Sub 'PN_RADD_DAO_RADDREGISTRYTABLEV2=${RaddRegistryDynamoTableV2Name}'
        ContainerEnvEntry21: !Sub 'PN_RADD_SQS_INPUTQUEUENAME=${PnRaddAltInputQueueName}'
        ContainerEnvEntry22: !Sub 'PN_RADD_REGISTRYSAFESTORAGEDOCTYPE=${RegistrySafeStorageDocType}'
        ContainerEnvEntry23: !Sub 'PN_RADD_REGISTRYDEFAULTENDVALIDITY=${RegistryDefaultEndValidity}'
        ContainerEnvEntry24: !Sub 'PN_RADD_REGISTRYDEFAULTDELETERULE=${RegistryDefaultDeleteRule}'
        ContainerEnvEntry25: !Sub 'PN_RADD_REGISTRYIMPORTUPLOADFILETTL=${RegistryImportUploadFileTtl}'
        ContainerEnvEntry26: !Sub 'PN_RADD_SQS_SAFESTORAGEQUEUENAME=${SafeStorageToRaddAltQueueName}'
        ContainerEnvEntry27: !Sub 'PN_RADD_MAX_PRINT_REQUESTS=${MaxPrintRequests}'
        ContainerEnvEntry28: !Sub 'AWS_GEO_REGIONCODE=${AwsGeoRegionCode}'
        ContainerEnvEntry29: !Sub 'WIRE_TAP_LOG=${WireTapLogActivation}'
        ContainerEnvEntry30: !Sub 'SPRING_CLOUD_FUNCTIONROUTER_QUEUES_LIST=${PnRaddAltInputQueueName},${SafeStorageToRaddAltQueueName}'
        ContainerEnvEntry31: !Sub 'PN_RADD_DAO_SHEDLOCKTABLENAME=${ShedLockTableName}'
        ContainerEnvEntry32: !Sub 'PN_RADD_MAX_PAGE_NUMBER=${PnRaddMaxPageNumber}'
        ContainerEnvEntry33: !Sub 'PN_RADD_VERIFYRADDREGISTRYIMPORT_LOCKATMOST=${VerifyRaddRegistryImportLockAtMost}'
        ContainerEnvEntry34: !Sub 'PN_RADD_VERIFYRADDREGISTRYIMPORT_LOCKATLEAST=${VerifyRaddRegistryImportLockAtLeast}'
        ContainerEnvEntry35: !Sub 'PN_RADD_VERIFYRADDREGISTRYIMPORT_DELAY=${VerifyRaddRegistryImportDelay}'
        ContainerEnvEntry36: !Sub 'PN_RADD_MAXQUERYSIZE=${MaxQuerySize}'
        ContainerEnvEntry37: !Sub 'PN_RADD_REGISTRYIMPORTREPLACEDTTL=${RegistryImportReplacedTtl}'
        ContainerEnvEntry38: !Sub 'PN_CRON_ANALYZER=${PnCronAnalyzer}'
        ContainerEnvEntry39: !Sub 'PN_RADD_MAX_DYNAMO_DB_QUERY_SIZE=${PnRaddMaxDynamoDBQuerySize}'
        ContainerEnvEntry40: !Sub 'PN_RADD_EVALUATED_ZIP_CODE_CONFIG_TYPE=${EvaluatedZipCodeConfigType}'
        ContainerEnvEntry41: !Sub 'PN_RADD_EVALUATED_ZIP_CODE_CONFIG_NUMBER=${EvaluatedZipCodeConfigNumber}'
        ContainerEnvEntry42: !Sub 'PN_RADD_EVENTBUS_NAME=arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${ProjectName}-CoreEventBus'
        ContainerEnvEntry43: !Sub 'PN_RADD_DAO_RADDCOVERAGETABLE=${RaddCoverageDynamoTableName}'
        ContainerEnvEntry44: !Sub 'PN_RADD_DOCUMENTPAGECOUNTENABLED=${DocumentPageCountEnabled}'
        ContainerEnvEntry45: !Sub 'PN_RADD_CLIENT_TIMELINE_SERVICE_BASEPATH=http://${ApplicationLoadBalancerDomain}:8080'
        MappedPaths: '/radd-net/*,/radd-net-private/*,/radd-alt/*,/radd-bo/*'
        ECSClusterName: !Ref ECSClusterName
        Subnets: !Ref VpcEgressSubnetsIds
        VpcId: !Ref VpcId
        EcsDefaultSecurityGroup: !Ref EcsDefaultSecurityGroup
        LoadBalancerListenerArn: !Ref ApplicationLoadBalancerListenerArn
        LoadbalancerRulePriority: !Ref MicroserviceNumber
        AlbSecurityGroup: !Ref AlbSecurityGroup
        TaskRoleManagedPolicyArn: !Ref RaddMicroserviceTaskManagedPolicy
        EcsLogGroup: !Ref EcsLogGroup
        LogAlarmStrategyV1: FATAL

  # Grant operational rights to PN-RADD microservice
  RaddMicroserviceTaskManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
             - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretAndSSMPrefix}*'
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:GetQueueUrl
              - sqs:ChangeMessageVisibility
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ReceiveMessage
            Resource:
              - !Ref PnRaddAltInputQueueDLQARN
              - !Ref PnRaddAltInputQueueARN
              - !Ref SafeStorageToRaddAltQueueARN
          - Effect: Allow
            Action:
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:ExecuteTransaction
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:TransactGetItems
              - dynamodb:TransactWriteItems
              - dynamodb:UpdateItem
              - dynamodb:Scan
            Resource:
              - !Sub "${RaddTransactionDynamoTableArn}"
              - !Sub "${RaddTransactionDynamoTableArn}/*"
              - !Sub "${OperationsDynamoTableArn}"
              - !Sub "${OperationsDynamoTableArn}/*"
              - !Sub "${RaddRegistryRequestDynamoTableArn}"
              - !Sub "${RaddRegistryRequestDynamoTableArn}/*"
              - !Sub "${RaddRegistryImportDynamoTableArn}"
              - !Sub "${RaddRegistryImportDynamoTableArn}/*"
              - !Sub "${RaddRegistryDynamoTableArn}"
              - !Sub "${RaddRegistryDynamoTableArn}/*"
              - !Sub "${RaddRegistryDynamoTableV2Arn}"
              - !Sub "${RaddRegistryDynamoTableV2Arn}/*"
              - !Sub "${RaddCoverageDynamoTableArn}"
              - !Sub "${RaddCoverageDynamoTableArn}/*"
              - !Sub "${ShedLockTableArn}"
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource:
              - !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${ProjectName}-CoreEventBus
          - Effect: Allow
            Action:
              - geo-places:Geocode
            Resource:
              - !Sub arn:aws:geo-places:${AwsGeoRegionCode}::provider/default

  RaddPrivateProxyLambdaSecGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      GroupDescription: !Sub '${ProjectName}-radd-alt-private-proxy-sec-group'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          DestinationSecurityGroupId: !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-radd-alt-private-proxy-sg'

  RaddPrivateProxyLambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  RaddPrivateProxyLambda:
    Type: AWS::Lambda::Function
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      FunctionName: !Ref RaddPrivateProxyLambdaName
      Runtime: !Ref RaddPrivateProxyLambdaRuntime
      Handler: index.handler
      Role: !GetAtt RaddPrivateProxyLambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref MicroserviceBucketName
        S3Key: !Sub '${MicroserviceBucketBaseKey}/functions_zip/raddPrivateProxy.zip'
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt RaddPrivateProxyLambdaSecGroup.GroupId
        SubnetIds: !Split [",", !Ref VpcEgressSubnetsIds]
      MemorySize: !Ref RaddPrivateProxyLambdaMemorySize
      Timeout: !Ref RaddPrivateProxyLambdaTimeout
      ReservedConcurrentExecutions: !Ref RaddPrivateProxyReservedConcurrency
      Environment:
        Variables:
          RADD_PRIVATE_PROXY_ALLOWED_PATH_PREFIX: !Ref RaddPrivateProxyAllowedPathPrefix
          RADD_PRIVATE_PROXY_BACKEND_BASE_URL: !Sub 'http://${ApplicationLoadBalancerDomain}:8080'
          RADD_PRIVATE_PROXY_ENDPOINT_SERVICE_ID: !Ref RaddPrivateProxyEndpointServiceId
          # External protocol is explicit; ALB hop is HTTP.
          RADD_PRIVATE_PROXY_EXTERNAL_PROTOCOL: !Ref RaddPrivateProxyExternalProtocol
          # External port is explicit; ALB hop can be 8080/8081.
          RADD_PRIVATE_PROXY_EXTERNAL_PORT: !Ref RaddPrivateProxyExternalPort
          # Full ingress dump is opt-in.
          RADD_PRIVATE_PROXY_VERBOSE_LOGGING: !Ref RaddPrivateProxyVerboseLogging
          RADD_PRIVATE_PROXY_TRUSTED_HEADERS: !Ref RaddPrivateProxyTrustedHeaders

  RaddPrivateProxyLambdaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      TargetType: lambda
      Targets:
        - Id: !GetAtt RaddPrivateProxyLambda.Arn
      HealthCheckEnabled: false

  RaddPrivateProxyLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      FunctionName: !GetAtt RaddPrivateProxyLambda.Arn
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  RaddPrivateProxyListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: IsRaddPrivateProxyEnabled
    DependsOn:
      - RaddPrivateProxyLambdaInvokePermission
    Properties:
      ListenerArn: !Ref RaddPrivateProxyAlbListenerArn
      Priority: !Ref RaddPrivateProxyRulePriority
      Actions:
        - Type: forward
          TargetGroupArn: !Ref RaddPrivateProxyLambdaTargetGroup
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - !If
                - HasRaddPrivateProxyListenerPathPrefix
                - !Sub '${RaddPrivateProxyListenerPathPrefix}*'
                - '*'

  RaddPrivateProxyLambdaAlarms:
    Type: AWS::CloudFormation::Stack
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/lambda-alarms.yaml"
      Parameters:
        FunctionName: !Ref RaddPrivateProxyLambdaName
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn

  RaddPrivateProxyLambdaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      AlarmDescription: !Sub '${ProjectName}-radd-alt-private-proxy Lambda throttles'
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref RaddPrivateProxyLambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopicArn

  RaddPrivateProxyLambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      AlarmDescription: !Sub '${ProjectName}-radd-alt-private-proxy Lambda duration'
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref RaddPrivateProxyLambda
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref RaddPrivateProxyDurationAlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopicArn

  RaddPrivateProxyRejectedPathAlarm:
    Type: AWS::CloudFormation::Stack
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/custom-metric.yaml"
      Parameters:
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        MetricName: !Sub "${ProjectName}-radd-alt-private-proxy-rejected-path"
        MetricNamespace: !Ref MetricNamespace
        LogGroupName: !Sub "/aws/lambda/${RaddPrivateProxyLambdaName}"
        FilterPattern: '"RADD private proxy rejected path"'
        Threshold: 1
        EvaluationPeriods: !Ref RaddPrivateProxyLogAlarmEvaluationPeriods
        DatapointsToAlarm: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        Statistic: Sum
        HasAlarm: true
        HasOncall: false
        OncallComparisonOperator: GreaterThanOrEqualToThreshold
        OncallStatistic: Sum

  RaddPrivateProxyBaseUrlFailureAlarm:
    Type: AWS::CloudFormation::Stack
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/custom-metric.yaml"
      Parameters:
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        MetricName: !Sub "${ProjectName}-radd-alt-private-proxy-base-url-failure"
        MetricNamespace: !Ref MetricNamespace
        LogGroupName: !Sub "/aws/lambda/${RaddPrivateProxyLambdaName}"
        FilterPattern: '"RADD private proxy failed Host validation" "RADD private proxy initialization failed"'
        Threshold: 1
        EvaluationPeriods: !Ref RaddPrivateProxyLogAlarmEvaluationPeriods
        DatapointsToAlarm: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        Statistic: Sum
        HasAlarm: true
        HasOncall: false
        OncallComparisonOperator: GreaterThanOrEqualToThreshold
        OncallStatistic: Sum

  RaddPrivateProxyBackendForwardFailureAlarm:
    Type: AWS::CloudFormation::Stack
    Condition: IsRaddPrivateProxyEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/custom-metric.yaml"
      Parameters:
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        MetricName: !Sub "${ProjectName}-radd-alt-private-proxy-backend-forward-failure"
        MetricNamespace: !Ref MetricNamespace
        LogGroupName: !Sub "/aws/lambda/${RaddPrivateProxyLambdaName}"
        FilterPattern: '"RADD private proxy backend forward failed"'
        Threshold: 1
        EvaluationPeriods: !Ref RaddPrivateProxyLogAlarmEvaluationPeriods
        DatapointsToAlarm: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        Statistic: Sum
        HasAlarm: true
        HasOncall: false
        OncallComparisonOperator: GreaterThanOrEqualToThreshold
        OncallStatistic: Sum

  # Expose PN-Radd-Alt microservice public API with API-GW for RADD usage
  RaddAltMicroservicePublicAPI:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/api-gw-expose-service-openapi.yaml"
      Parameters:
        MicroServiceUniqueName: !Sub '${ProjectName}-radd-alt'
        IntendedUsage: RADD
        DnsName: !Ref RaddApiDnsName
        ProjectName: !Ref ProjectName
        ServiceApiPath: 'radd-net'
        NetworkLoadBalancerLink: !Ref NetworkLoadBalancerLink
        ApplicationLoadBalancerDomain: !Ref ApplicationLoadBalancerDomain
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        CloudwatchLogKinesisStreamArn: !Ref LogsKinesisSourceStreamArn
        OpenApiBucketName: !Ref MicroserviceBucketName
        OpenApiBucketKey: !Sub ${MicroserviceBucketBaseKey}/docs/openapi/aws/api-radd-net-RADD-aws.yaml

  RaddAltMicroservicePublicRaddApiWaf:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/api-gw-waf-acl.yaml"
      Parameters:
        WAFName: !Sub '${ProjectName}-radd-alt-radd'
        IntendedUsage: RADD
        APIGatewayARNs: !GetAtt RaddAltMicroservicePublicAPI.Outputs.APIGatewayARN
        Limit: !Ref RaddWafLimit

  # Expose PN-Radd-Alt microservice public API with API-GW for BACKOFFICE usage
  RaddAltMicroserviceBoPublicAPI:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/api-gw-expose-service-openapi.yaml"
      Parameters:
        MicroServiceUniqueName: !Sub '${ProjectName}-radd-alt'
        IntendedUsage: BACKOFFICE
        DnsName: !Ref RaddApiDnsName
        ProjectName: !Ref ProjectName
        ServiceApiPath: 'radd-bo'
        NetworkLoadBalancerLink: !Ref NetworkLoadBalancerLink
        ApplicationLoadBalancerDomain: !Ref ApplicationLoadBalancerDomain
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        CloudwatchLogKinesisStreamArn: !Ref LogsKinesisSourceStreamArn
        OpenApiBucketName: !Ref MicroserviceBucketName
        OpenApiBucketKey: !Sub ${MicroserviceBucketBaseKey}/docs/openapi/aws/api-radd-bo-BO-aws.yaml

  RaddAltMicroservicePublicBoApiWaf:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/api-gw-waf-acl.yaml"
      Parameters:
        WAFName: !Sub '${ProjectName}-radd-alt-bo'
        IntendedUsage: BACKOFFICE
        APIGatewayARNs: !GetAtt RaddAltMicroserviceBoPublicAPI.Outputs.APIGatewayARN
        Limit: !Ref RaddWafLimit

  # Rate limiting
  RaddAltApiRateLimiting:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/applicative-throttling.yaml"
      Parameters:
        AlarmSNSTopicArn: !Ref AlarmSNSTopicArn
        LogRetentionDays: !Ref LogRetention
        ApplicationLoadBalancerArn: !Ref ApplicationLoadBalancerArn
        ThrottledPathsRegexp: '/radd-net/.*'
        ThrottlingGroupString: 'radd-by-cf'
        MaxRequestPerThrottlingPeriod: !Ref MaxRequestPerThrottlingPeriod
        ThrottlingPeriodSeconds: !Ref ThrottlingPeriodSeconds

  ######## WEB ACL ########
  RaddAltBlockRegistryAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: IsImportLocationsBlocked
    Properties: 
      ResourceArn: !GetAtt RaddAltMicroservicePublicAPI.Outputs.APIGatewayARN
      WebACLArn: !GetAtt RaddAltBlockRegistryAcl.Arn

  RaddAltBlockRegistryAcl:
    Type: AWS::WAFv2::WebACL
    Condition: IsImportLocationsBlocked
    Properties:
      Name: RaddAltBlockRegistryAcl
      Scope: REGIONAL
      Description: WebACL che permette di inibire le chiamate al registry
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: radd-alt-blocking-registry-webacl-metric
      CustomResponseBodies:
        BlockRegistry:
          ContentType: TEXT_PLAIN
          Content: Registry disabled
      Rules:
        - Name: BlockRADDregistry
          Priority: 10
          VisibilityConfig: 
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: radd-alt-blocking-registry-webacl-rule-metric
          Action: 
            Block:
              CustomResponse:
                ResponseCode: 403
                CustomResponseBodyKey: BlockRegistry
          Statement: 
            ByteMatchStatement: 
              FieldToMatch:
                UriPath: {}
              PositionalConstraint: STARTS_WITH
              SearchString: /radd-net/api/v1/registry
              TextTransformations:
                - Type: NONE
                  Priority: 0

  # Dashboard
  RaddAltMicroserviceCloudWatchDashboard:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBucketBaseUrl}/fragments/microservice-cloudwatch-dashboard.yaml"
      Parameters:
        DashboardName: !Sub "${ProjectName}-radd-alt"
        DynamoDBTableNames: !Join
          - ','
          - - !Ref RaddTransactionDynamoTableName
            - !Ref OperationsDynamoTableName
            - !Ref RaddRegistryRequestDynamoTableName
            - !Ref RaddRegistryImportDynamoTableName
            - !Ref RaddRegistryDynamoTableName
            - !Ref RaddRegistryDynamoTableV2Name
            - !Ref RaddCoverageDynamoTableName
        QueueArns: !Join
          - ','
          - - !Ref PnRaddAltInputQueueName
        AlarmArns: !Join
          - ','
          - - !GetAtt RaddMicroservice.Outputs.FatalLogsMetricAlarmArn
